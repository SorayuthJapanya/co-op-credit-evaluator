server {
    listen 80;
    server_name coopcreditcheck.com www.coopcreditcheck.com;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files and support client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend server
    # Adjust proxy_pass to match the service name and port in docker-compose.yml
    location /api/ {
        # 'server' is the service name in docker-compose, and 10000 is its internal port
        proxy_pass http://server:10000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
