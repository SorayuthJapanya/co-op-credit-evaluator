services:
  # Web Service
  - type: web
    name: credit-evaluator-api
    env: docker
    repo: https://github.com/SorayuthJapanya/co-op-credit-evaluator.git
    rootDir: server
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_DSN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend-url.onrender.com
